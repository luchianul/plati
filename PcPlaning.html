<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DiazElectricite Pro Auto-Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #E5E5EA;
            --ios-card: #FFFFFF;
            --ios-red: #FF3B30;
            --ios-gray: #8E8E93;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--ios-bg); margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .app-shell { width: 100%; max-width: 450px; min-height: 100vh; padding: 15px; box-sizing: border-box; }

        /* HEADER */
        .top-card { background: var(--ios-card); border-radius: 24px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .user-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 42px; height: 42px; background: var(--ios-blue); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }
        .user-name { font-size: 17px; font-weight: 800; margin: 0; color: #1C1C1E; }
        
        .search-box { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; background: #F2F2F7; border: none; padding: 12px 15px 12px 40px; border-radius: 14px; font-family: inherit; font-size: 14px; box-sizing: border-box; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; }

        .nav-tabs { display: flex; background: #F2F2F7; padding: 4px; border-radius: 12px; }
        .tab-btn { flex: 1; border: none; background: none; padding: 10px; font-size: 12px; font-weight: 700; border-radius: 9px; color: var(--ios-gray); transition: 0.2s; cursor: pointer; }
        .tab-btn.active { background: white; color: black; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        /* TIMELINE */
        .timeline-card { background: var(--ios-card); border-radius: 22px; padding: 15px 10px; box-shadow: var(--shadow); margin-bottom: 12px; }
        .timeline-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px 12px; border-bottom: 1px solid #F2F2F7; margin-bottom: 12px; }
        .current-month { font-size: 14px; font-weight: 800; text-transform: capitalize; }
        
        .jump-btn { position: relative; background: #F2F2F7; border: none; padding: 8px 12px; border-radius: 10px; font-size: 13px; display: flex; align-items: center; gap: 5px; font-weight: 700; color: var(--ios-blue); cursor: pointer; overflow: hidden; }
        #txt-calendar { pointer-events: none; z-index: 1; }
        #date-jump { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; width: 100%; height: 100%; }

        .timeline-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 5px 0 10px 0; scrollbar-width: none; scroll-behavior: smooth; }
        .timeline-scroll::-webkit-scrollbar { display: none; }
        
        .t-day { min-width: 50px; height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; background: #F2F2F7; cursor: pointer; position: relative; transition: 0.3s; }
        .t-day.is-today { border: 2px solid rgba(0,122,255,0.3); }
        .t-day.active { background: var(--ios-blue); color: white; transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,122,255,0.2); }
        .t-day .t-nr { font-size: 17px; font-weight: 800; }
        .t-day .t-nume { font-size: 9px; font-weight: 600; text-transform: uppercase; opacity: 0.7; }
        .t-dot { position: absolute; bottom: 6px; width: 5px; height: 5px; background: var(--ios-blue); border-radius: 50%; }
        .t-day.active .t-dot { background: white; }

        /* CARDS */
        .card { background: var(--ios-card); border-radius: 20px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; box-shadow: var(--shadow); cursor: pointer; }
        .time-badge { min-width: 100px; padding-right: 12px; margin-right: 12px; border-right: 2px solid #F2F2F7; text-align: center; }
        .time-val { font-size: 12px; font-weight: 800; color: #1C1C1E; white-space: nowrap; margin-bottom: 4px; }
        .date-val { font-size: 9px; color: var(--ios-blue); font-weight: 700; line-height: 1.2; }
        .card-content { flex: 1; }
        .client-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .location { font-size: 12px; color: var(--ios-gray); }

        /* MODALS */
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: #000; color: white; border-radius: 20px; border: none; font-size: 30px; z-index: 1001; cursor: pointer; }
        #modal, #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-body { background: white; width: 95%; max-width: 380px; border-radius: 28px; padding: 25px; box-sizing: border-box; overflow-y: auto; max-height: 90vh; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--ios-gray); margin-bottom: 5px; margin-left: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #F2F2F7; border: 1px solid #E5E5EA; padding: 12px; border-radius: 12px; margin-bottom: 5px; font-family: inherit; box-sizing: border-box; font-size: 14px; }
        .flex-row { display: flex; gap: 8px; }
        .save-btn { background: #000; color: white; width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; margin-top: 10px; cursor: pointer; }
        #loader { display: none; position: fixed; top: 20px; background: #000; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 11px; z-index: 3000; }
        
        /* DELETE BUTTON */
        .del-btn { display: none; background: #fff; color: var(--ios-red); border: 1.5px solid var(--ios-red); width: 100%; padding: 12px; border-radius: 16px; font-weight: 700; margin-top: 8px; cursor: pointer; align-items: center; justify-content: center; gap: 6px; }
    </style>
</head>
<body>

<div id="loader">Se încarcă...</div>

<div class="app-shell">
    <div class="top-card">
        <div class="user-row">
            <div class="user-info">
                <div class="avatar" id="app-icon">G</div>
                <h2 class="user-name" id="welcome-text">Salut, Gabriel!</h2>
            </div>
            <button style="background:none; border:none; font-size:22px; cursor:pointer" onclick="openSettings()">⚙️</button>
        </div>
        
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="search-query" oninput="render()">
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" id="t-azi" onclick="tab('azi')">Agenda</button>
            <button class="tab-btn" id="t-all" onclick="tab('all')">Toate Șantierele</button>
        </div>
    </div>

    <div class="timeline-card" id="timeline-box">
        <div class="timeline-header">
            <div class="current-month" id="month-display">Luna curentă</div>
            <div class="jump-btn">
                <span id="txt-calendar">📅 Calendar</span>
                <input type="date" id="date-jump" onchange="jumpToDate(this.value)">
            </div>
        </div>
        <div class="timeline-scroll" id="timeline-days"></div>
    </div>

    <div id="list"></div>
    <button class="fab" onclick="openM()">+</button>
</div>

<div id="modal">
    <div class="modal-body">
        <h2 style="text-align:center; margin-top:0; font-size: 20px;" id="txt-modal-title">Programare Șantier</h2>
        <input type="hidden" id="f-id">
        
        <div class="input-group">
            <label id="txt-label-client">Detalii Client</label>
            <input type="text" id="f-c">
            <input type="text" id="f-o">
        </div>

        <div class="input-group">
            <label id="txt-label-in">Inceput (Intrare)</label>
            <div class="flex-row">
                <input type="date" id="f-d1">
                <input type="time" id="f-h1">
            </div>
        </div>

        <div class="input-group">
            <label id="txt-label-out">Sfârșit (Ieșire)</label>
            <div class="flex-row">
                <input type="date" id="f-d2">
                <input type="time" id="f-h2">
            </div>
        </div>

        <div class="input-group">
            <label id="txt-label-tip">Tip Lucrare</label>
            <select id="f-t">
                <option value="interior">🏠 Interior</option>
                <option value="exterior">🌳 Exterior</option>
                <option value="vizita">📋 Vizită</option>
            </select>
        </div>

        <button class="save-btn" id="btn-save-job" onclick="save()">Salvează Programarea</button>
        <button class="del-btn" id="btn-delete-job" onclick="delJob()">🗑️ Șterge</button>
        <button onclick="closeM()" id="btn-cancel-job" style="width:100%; background:none; border:none; color:var(--ios-gray); margin-top:10px; font-weight:600; cursor:pointer">Anulează</button>
    </div>
</div>

<div id="settings-modal">
    <div class="modal-body">
        <h2 style="text-align:center; margin-top:0; font-size: 20px;">⚙️ Setări Profil</h2>
        
        <div class="input-group">
            <label id="set-label-name">Numele tău</label>
            <input type="text" id="set-name" placeholder="Ex: Gabriel">
        </div>

        <div class="input-group">
            <label id="set-label-lang">Limba Aplicației</label>
            <select id="set-lang">
                <option value="ro">Română 🇷🇴</option>
                <option value="fr">Français 🇫🇷</option>
                <option value="en">English 🇬🇧</option>
            </select>
        </div>

        <button class="save-btn" id="set-btn-save" onclick="saveSettings()">Salvează Setările</button>
        <button onclick="closeSettings()" id="set-btn-close" style="width:100%; background:none; border:none; color:var(--ios-gray); margin-top:10px; font-weight:600; cursor:pointer">Închide</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAPl5J3Pe-ZNNwgQCPONVH6QQI_AGzQETGH3tER6QSvkOjSBy3yLvf3gX0z4QQdy5R/exec";
    let jobs = [];
    let view = 'azi';
    let todayISO = new Date().toISOString().split('T')[0];
    let selectedDate = todayISO;

    const translations = {
        ro: {
            salut: "Salut", agenda: "Agenda", toate: "Toate Șantierele", cauta: "Caută client sau oraș...", 
            calendar: "📅 Calendar", niciun: "Niciun șantier de afișat.", titluModal: "Programare Șantier",
            lClient: "Detalii Client", lIn: "Inceput (Intrare)", lOut: "Sfârșit (Ieșire)", lTip: "Tip Lucrare",
            bSave: "Salvează Programarea", bCancel: "Anulează", bDel: "🗑️ Șterge", loading: "Se încarcă...",
            phClient: "Nume Client (Obligatoriu)", phLoc: "Locație (Oraș/Stradă)",
            setName: "Numele tău", setLang: "Limba Aplicației", setBSave: "Salvează Setările", setBClose: "Închide"
        },
        fr: {
            salut: "Salut", agenda: "Agenda", toate: "Tous les Chantiers", cauta: "Chercher client ou ville...", 
            calendar: "📅 Calendrier", niciun: "Aucun chantier à afficher.", titluModal: "Planification Chantier",
            lClient: "Détails Client", lIn: "Début (Entrée)", lOut: "Fin (Sortie)", lTip: "Type de Travail",
            bSave: "Enregistrer", bCancel: "Annuler", bDel: "🗑️ Supprimer", loading: "Chargement...",
            phClient: "Nom Client (Obligatoire)", phLoc: "Lieu (Ville/Rue)",
            setName: "Votre nom", setLang: "Langue de l'App", setBSave: "Enregistrer les paramètres", setBClose: "Fermer"
        },
        en: {
            salut: "Hello", agenda: "Agenda", toate: "All Jobs", cauta: "Search client or city...", 
            calendar: "📅 Calendar", niciun: "No jobs to display.", titluModal: "Job Scheduling",
            lClient: "Client Details", lIn: "Start (Check-in)", lOut: "End (Check-out)", lTip: "Work Type",
            bSave: "Save Job", bCancel: "Cancel", bDel: "🗑️ Delete", loading: "Loading...",
            phClient: "Client Name (Required)", phLoc: "Location (City/Street)",
            setName: "Your Name", setLang: "App Language", setBSave: "Save Settings", setBClose: "Close"
        }
    };

    async function load() {
        document.getElementById('loader').style.display = 'block';
        try {
            const r = await fetch(SCRIPT_URL);
            const data = await r.json();
            jobs = data.map(x => ({ 
                id: x[0], client: x[1] || "Client", oras: x[2] || "Locație", 
                data: String(x[3] || "").trim(), ora: x[4] || "--:--", 
                tip: x[5] || "interior", data_out: String(x[6] || x[3] || "").trim(), ora_out: x[7] || "--:--"
            }));
            buildTimeline();
            render();
            centerSelectedDate();
        } catch(e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function buildTimeline() {
        const cont = document.getElementById('timeline-days');
        const monthDisp = document.getElementById('month-display');
        cont.innerHTML = "";
        const baseDate = new Date(selectedDate);
        const lang = localStorage.getItem('u_lang') || 'ro';
        monthDisp.innerText = baseDate.toLocaleDateString(lang === 'ro' ? 'ro-RO' : (lang === 'fr' ? 'fr-FR' : 'en-US'), { month: 'long', year: 'numeric' });

        for (let i = -20; i < 40; i++) {
            const d = new Date(selectedDate);
            d.setDate(baseDate.getDate() + i);
            const iso = d.toISOString().split('T')[0];
            const hasJob = jobs.some(j => j.data <= iso && j.data_out >= iso);
            
            cont.innerHTML += `
                <div class="t-day ${iso === selectedDate ? 'active' : ''} ${iso === todayISO ? 'is-today' : ''}" id="t-${iso}" onclick="selectDate('${iso}')">
                    <span class="t-nume">${d.toLocaleDateString(lang === 'ro'?'ro-RO':(lang==='fr'?'fr-FR':'en-US'), { weekday: 'short' })}</span>
                    <span class="t-nr">${d.getDate()}</span>
                    ${hasJob ? '<div class="t-dot"></div>' : ''}
                </div>`;
        }
        document.getElementById('timeline-box').style.display = (view === 'all') ? 'none' : 'block';
    }

    function centerSelectedDate() {
        setTimeout(() => {
            const el = document.getElementById(`t-${selectedDate}`);
            if(el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }, 300);
    }

    function selectDate(iso) {
        selectedDate = iso;
        buildTimeline();
        document.getElementById('search-query').value = ""; 
        render();
        centerSelectedDate();
    }

    function jumpToDate(val) {
        if(!val) return;
        selectedDate = val;
        buildTimeline();
        render();
        centerSelectedDate();
    }

    function formatShortDate(iso) {
        if(!iso) return "";
        const pts = iso.split('-');
        return pts.length === 3 ? `${pts[2]}/${pts[1]}` : "";
    }

    function render() {
        const cont = document.getElementById('list');
        const query = document.getElementById('search-query').value.toLowerCase();
        const lang = localStorage.getItem('u_lang') || 'ro';
        cont.innerHTML = "";
        
        let filtered = jobs.filter(x => {
            const matchSearch = x.client.toLowerCase().includes(query) || x.oras.toLowerCase().includes(query);
            if (query !== "") return matchSearch;
            if (view === 'azi') return x.data <= selectedDate && x.data_out >= selectedDate;
            return true;
        });

        if (view === 'all' && query === "") {
            filtered.sort((a,b) => a.data.localeCompare(b.data));
        }

        if(filtered.length === 0) {
            cont.innerHTML = `<div style="text-align:center; padding:50px 20px; color:gray; font-size:14px; background:white; border-radius:20px; box-shadow:var(--shadow)">${translations[lang].niciun}</div>`;
            return;
        }

        filtered.forEach(x => {
            const icon = x.tip === 'exterior' ? '🌳' : (x.tip === 'vizita' ? '📋' : '🏠');
            const hStart = (x.ora || "").substring(0,5);
            const hEnd = (x.ora_out || "").substring(0,5);
            const dStart = formatShortDate(x.data);
            const dEnd = formatShortDate(x.data_out);
            const dateDisplay = (x.data === x.data_out || !x.data_out) ? dStart : `${dStart} - ${dEnd}`;

            cont.innerHTML += `
                <div class="card" onclick="openM('${x.id}')">
                    <div class="time-badge">
                        <div class="time-val">${hStart} - ${hEnd}</div>
                        <div class="date-val">${dateDisplay}</div>
                    </div>
                    <div class="card-content">
                        <div class="client-name">${x.client}</div>
                        <div class="location">📍 ${x.oras} ${icon}</div>
                    </div>
                </div>`;
        });
    }

    function tab(m) {
        view = m;
        document.getElementById('t-azi').classList.toggle('active', m === 'azi');
        document.getElementById('t-all').classList.toggle('active', m === 'all');
        if(m === 'azi') {
            selectedDate = todayISO;
            buildTimeline();
            centerSelectedDate();
        }
        render();
    }

    function openSettings() {
        document.getElementById('set-name').value = localStorage.getItem('u_name') || "Gabriel";
        document.getElementById('set-lang').value = localStorage.getItem('u_lang') || "ro";
        document.getElementById('settings-modal').style.display = 'flex';
    }

    function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

    function saveSettings() {
        const n = document.getElementById('set-name').value;
        const l = document.getElementById('set-lang').value;
        if(n.trim()) {
            localStorage.setItem('u_name', n);
            localStorage.setItem('u_lang', l);
            applyUi(n, l);
            closeSettings();
            buildTimeline();
            render();
        }
    }

    function applyUi(name, lang) {
        const t = translations[lang];
        document.getElementById('welcome-text').innerText = `${t.salut}, ${name}!`;
        document.getElementById('app-icon').innerText = name.charAt(0).toUpperCase();
        document.getElementById('t-azi').innerText = t.agenda;
        document.getElementById('t-all').innerText = t.toate;
        document.getElementById('search-query').placeholder = t.cauta;
        document.getElementById('txt-calendar').innerText = t.calendar;
        document.getElementById('loader').innerText = t.loading;
        
        document.getElementById('txt-modal-title').innerText = t.titluModal;
        document.getElementById('txt-label-client').innerText = t.lClient;
        document.getElementById('f-c').placeholder = t.phClient;
        document.getElementById('f-o').placeholder = t.phLoc;
        document.getElementById('txt-label-in').innerText = t.lIn;
        document.getElementById('txt-label-out').innerText = t.lOut;
        document.getElementById('txt-label-tip').innerText = t.lTip;
        document.getElementById('btn-save-job').innerText = t.bSave;
        document.getElementById('btn-cancel-job').innerText = t.bCancel;
        document.getElementById('btn-delete-job').innerText = t.bDel;
        
        document.getElementById('set-label-name').innerText = t.setName;
        document.getElementById('set-label-lang').innerText = t.setLang;
        document.getElementById('set-btn-save').innerText = t.setBSave;
        document.getElementById('set-btn-close').innerText = t.setBClose;
    }

    async function save() {
        const client = document.getElementById('f-c').value;
        if(!client) return;

        const payload = {
            action: document.getElementById('f-id').value ? "edit" : "add",
            id: document.getElementById('f-id').value || "ID-" + Date.now(),
            client: client,
            oras: document.getElementById('f-o').value,
            data_in: document.getElementById('f-d1').value,
            ora_in: document.getElementById('f-h1').value,
            data_out: document.getElementById('f-d2').value,
            ora_out: document.getElementById('f-h2').value,
            tip: document.getElementById('f-t').value
        };
        closeM();
        document.getElementById('loader').style.display = 'block';
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        load();
    }

    async function delJob() {
        const id = document.getElementById('f-id').value;
        if(!id) return;
        if(!confirm("Ești sigur că vrei să ștergi acest șantier?")) return;

        closeM();
        document.getElementById('loader').style.display = 'block';
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
        load();
    }

    function openM(id = null) {
        const x = jobs.find(i => String(i.id) === String(id));
        document.getElementById('f-id').value = id || "";
        document.getElementById('f-c').value = id ? x.client : "";
        document.getElementById('f-o').value = id ? x.oras : "";
        document.getElementById('f-d1').value = id ? x.data : selectedDate;
        document.getElementById('f-h1').value = id ? String(x.ora || "").substring(0,5) : "";
        document.getElementById('f-d2').value = id ? x.data_out : (id ? "" : selectedDate);
        document.getElementById('f-h2').value = id ? String(x.ora_out || "").substring(0,5) : "";
        document.getElementById('f-t').value = id ? x.tip : "interior";
        
        // Afișăm butonul de ștergere DOAR dacă edităm un șantier existent
        document.getElementById('btn-delete-job').style.display = id ? 'flex' : 'none';
        
        document.getElementById('modal').style.display = 'flex';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }

    window.onload = () => {
        const n = localStorage.getItem('u_name') || "Gabriel";
        const l = localStorage.getItem('u_lang') || "ro";
        applyUi(n, l);
        load();
    }
</script>
</body>
</html>
