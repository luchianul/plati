<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gabriel | Smart Finance 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --season-primary: #5865f2;
            --season-glow: rgba(88, 101, 242, 0.2);
            --glass: rgba(255, 255, 255, 0.88);
            --text-dark: #0f172a;
            --urgent: #ef4444;
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background-image: url('manga.jpg'); background-size: cover;
            background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; padding: 20px; box-sizing: border-box;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(15,23,42,0.2) 0%, rgba(15,23,42,0.5) 100%);
            backdrop-filter: blur(3px); z-index: -1;
        }

        .main-wrapper { width: 100%; max-width: 450px; z-index: 1; }

        /* HEADER CU EFECT DE PULSARE DACA EXISTA PLATI NEFECTUATE */
        .frost-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15), 0 0 80px var(--season-glow);
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
        }

        .urgent-glow {
            animation: pulse-red 2s infinite;
            border: 2px solid var(--urgent) !important;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .app-icon {
            width: 65px; height: 65px; background: white; border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; font-weight: 900; color: var(--season-primary);
            margin: 0 auto 15px auto; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        #headerMonth {
            font-size: 11px; font-weight: 900; text-transform: uppercase;
            color: var(--season-primary); background: rgba(255,255,255,0.8);
            padding: 5px 15px; border-radius: 50px; display: inline-block;
            margin-top: 10px; border: 1px solid var(--season-primary);
        }

        /* BILL CARDS */
        .bill-card { 
            background: rgba(255, 255, 255, 0.75);
            border-radius: 20px; padding: 15px; margin-bottom: 12px;
            display: grid; grid-template-columns: 40px 1fr 65px 90px; 
            align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.5);
            transition: 0.3s;
        }
        .bill-card:hover { transform: scale(1.02); background: white; }

        .btn-pay { 
            padding: 10px; border-radius: 12px; border: none; font-size: 11px; 
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .unpaid { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
        .paid { background: var(--season-primary); color: white; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group input { 
            background: white; border: none; padding: 15px; 
            border-radius: 15px; font-size: 14px; outline: none; flex: 1;
        }
        .btn-add { 
            background: var(--season-primary); color: white; border: none; 
            width: 50px; height: 50px; border-radius: 15px; font-size: 24px; cursor: pointer;
        }

        h3 { font-size: 12px; text-transform: uppercase; color: white; background: var(--season-primary); padding: 5px 15px; border-radius: 10px; margin: 20px 0 10px 0; }
        
        .total-box { display: flex; justify-content: space-between; align-items: center; padding: 20px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:white; font-weight:800; font-size:14px;">
        <span id="welcomeUser">Welcome, Gabriel</span>
        <span onclick="schimbaNume()" style="cursor:pointer">⚙️</span>
    </div>

    <div id="statusPanel" class="frost-panel">
        <div class="app-icon" id="dynamicLetter">G</div>
        <h1 style="margin:0; font-size: 24px; font-weight: 900;">Management Plăți</h1>
        <div style="font-family:'Caveat'; color:var(--season-primary); font-size:20px;">power by VerTech</div>
        <div id="headerMonth">--</div>
    </div>

    <div class="input-group">
        <input type="text" id="newFactura" placeholder="Nume factură...">
        <input type="number" id="newSuma" placeholder="€" style="max-width: 80px;">
        <button class="btn-add" onclick="adaugaFactura()">+</button>
    </div>

    <div id="mainContent">
        <h3>De achitat acum</h3>
        <div id="containerNeplatite"></div>
        <h3>Istoric Lună</h3>
        <div id="containerPlatite"></div>
    </div>

    <div class="frost-panel total-box">
        <span style="font-size:11px; font-weight:900; opacity:0.6;">TOTAL ACHITAT</span>
        <div id="totalSumaPlatita" style="font-weight:900; font-size:28px;">0.00 €</div>
    </div>

    <button onclick="trimiteDate()" style="width:100%; padding:20px; background:var(--season-primary); color:white; border:none; border-radius:20px; font-weight:900; cursor:pointer; box-shadow: 0 10px 20px var(--season-glow);">Sincronizează Cloud</button>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzEW785lu1Wzwyr8v8dehrQBbpQJt-1ahGURPKZtosCFjla7RbRu-6cuctIIo2wmkI9RA/exec";
    let facturi = [];

    // 1. LOGICA DE SEZOANE
    function applySeasonUI() {
        const luna = new Date().getMonth();
        const colors = [
            { p: "#3b82f6", g: "rgba(59, 130, 246, 0.2)" }, // Iarna
            { p: "#10b981", g: "rgba(16, 185, 129, 0.2)" }, // Primavara
            { p: "#f59e0b", g: "rgba(245, 158, 11, 0.2)" }, // Vara
            { p: "#f97316", g: "rgba(249, 115, 22, 0.2)" }  // Toamna
        ];
        let s = colors[3]; // default toamna
        if (luna <= 1 || luna === 11) s = colors[0];
        else if (luna >= 2 && luna <= 4) s = colors[1];
        else if (luna >= 5 && luna <= 7) s = colors[2];

        document.documentElement.style.setProperty('--season-primary', s.p);
        document.documentElement.style.setProperty('--season-glow', s.g);
        document.getElementById('headerMonth').innerText = new Date().toLocaleString('ro-RO', { month: 'long', year: 'numeric' });
    }

    // 2. SMART SYNC (Refresh la 3 AM + Sync la 10 min)
    function initSmartSync() {
        setInterval(() => {
            const acum = new Date();
            if (acum.getHours() === 3 && acum.getMinutes() === 0) location.reload();
        }, 60000);

        setInterval(async () => {
            const r = await fetch(scriptURL + "?t=" + new Date().getTime());
            const data = await r.json();
            if (Array.isArray(data)) { facturi = data; render(); }
        }, 600000);
    }

    // 3. RENDER & NOTIFICARE VIZUALA
    function render() {
        const ne = document.getElementById("containerNeplatite"), pl = document.getElementById("containerPlatite");
        ne.innerHTML = ""; pl.innerHTML = "";
        let total = 0;

        facturi.forEach((f, i) => {
            const card = `<div class="bill-card">
                <span onclick="sterge(${i})" style="cursor:pointer; opacity:0.3;">✕</span>
                <div style="font-weight:700;">${f.nume}</div>
                <div style="font-weight:900; color:var(--season-primary);">${f.suma}€</div>
                <button class="btn-pay ${f.status?'paid':'unpaid'}" onclick="toggle(${i})">${f.status?'OK':'ACHITĂ'}</button>
            </div>`;
            if(!f.status) ne.innerHTML += card;
            else { pl.innerHTML += card; total += parseFloat(f.suma) || 0; }
        });

        // Alerta vizuala: daca ai plati neefectuate, panelul pulseaza rosu
        const hasUnpaid = facturi.some(f => !f.status);
        document.getElementById('statusPanel').className = hasUnpaid ? "frost-panel urgent-glow" : "frost-panel";
        
        document.getElementById("totalSumaPlatita").innerText = total.toFixed(2) + " €";
        localStorage.setItem("facturi_gabriel_final", JSON.stringify(facturi));
    }

    // --- FUNCTII AJUTATOARE ---
    function toggle(i) { facturi[i].status = !facturi[i].status; render(); }
    function sterge(i) { facturi.splice(i, 1); render(); }
    function adaugaFactura() {
        const n = document.getElementById("newFactura"), s = document.getElementById("newSuma");
        if(n.value) { facturi.push({nume: n.value, suma: s.value||0, status: false}); n.value=""; s.value=""; render(); }
    }
    function schimbaNume() { 
        const n = prompt("Numele tau:", localStorage.getItem("userName") || "Gabriel");
        if(n) { localStorage.setItem("userName", n); location.reload(); }
    }
    async function incarcaDate() {
        applySeasonUI();
        const user = localStorage.getItem("userName") || "Gabriel";
        document.getElementById('welcomeUser').innerText = "Welcome, " + user;
        document.getElementById('dynamicLetter').innerText = user[0];
        try {
            const r = await fetch(scriptURL + "?t=" + new Date().getTime());
            facturi = await r.json();
            render();
        } catch(e) { 
            facturi = JSON.parse(localStorage.getItem("facturi_gabriel_final")) || [];
            render();
        }
    }

    window.onload = () => { incarcaDate(); initSmartSync(); };
</script>
</body>
</html>
